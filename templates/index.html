<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>My Movie Watchlist</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #f8f9fa; }
        .movie-card { background: white; border-radius: 10px; padding: 15px; margin-bottom: 15px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
    </style>
</head>
<body>
<div class="container py-5">
    <div class="d-flex justify-content-between align-items-center mb-4">
        <h1>Welcome, {{ username }}! 👋</h1>
        <a href="{{ url_for('logout') }}" class="btn btn-danger">Logout</a>
    </div>

    <div class="card p-4 mb-4">
        <form method="POST" class="d-flex gap-2">
            <input type="text" name="title" class="form-control" placeholder="Add a new movie..." required>
            <button type="submit" class="btn btn-success">Add</button>
        </form>
    </div>

    <div class="mb-4">
        <a href="{{ url_for('index') }}" class="btn btn-outline-primary {% if not current_filter %}active{% endif %}">All</a>
        <a href="{{ url_for('index', filter='To Watch') }}" class="btn btn-outline-primary {% if current_filter == 'To Watch' %}active{% endif %}">To Watch</a>
        <a href="{{ url_for('index', filter='Watched') }}" class="btn btn-outline-primary {% if current_filter == 'Watched' %}active{% endif %}">Watched</a>
    </div>

    {% for movie in movies %}
    <div class="movie-card">
        <div class="d-flex justify-content-between align-items-start">
            <div>
                <h4 class="mb-1">{{ movie.title }}</h4>
                <span class="badge {% if movie.status == 'Watched' %}bg-success{% else %}bg-secondary{% endif %}">
                    {{ movie.status }}
                </span>
            </div>
            <div class="d-flex gap-2">
                <form action="{{ url_for('toggle_status', movie_id=movie.id) }}" method="POST">
                    <button type="submit" class="btn btn-sm btn-info text-white">Change Status</button>
                </form>
                <form action="{{ url_for('delete_movie', movie_id=movie.id) }}" method="POST">
                    <button type="submit" class="btn btn-sm btn-outline-danger">🗑️</button>
                </form>
            </div>
        </div>

        <form action="{{ url_for('update_details', movie_id=movie.id) }}" method="POST" class="mt-3 row g-2">
            <div class="col-md-3">
                <label class="small">Rating (1-5):</label>
                <select name="rating" class="form-select form-select-sm">
                    {% for i in range(1, 6) %}
                    <option value="{{ i }}" {% if movie.rating == i %}selected{% endif %}>{{ i }} ⭐</option>
                    {% endfor %}
                </select>
            </div>
            <div class="col-md-4">
                <label class="small">Watched On:</label>
                <input type="datetime-local" name="watched_at" class="form-control form-control-sm" value="{{ movie.watched_at }}">
            </div>
            <div class="col-12">
                <label class="small">My Review / Description:</label>
                <textarea name="review" class="form-control form-control-sm" rows="2" placeholder="Write your notes here...">{{ movie.review or '' }}</textarea>
            </div>
            <div class="col-12 text-end">
                <button type="submit" class="btn btn-sm btn-primary">Save Details</button>
            </div>
        </form>
    </div>
    {% endfor %}
</div>
</body>
</html>
